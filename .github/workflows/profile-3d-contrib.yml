name: GitHub-Profile-3D-Contrib

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v3

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: GrandpaEJ

      - name: Push to output branch
        run: |
          # Move generated files to a safe place
          mv profile-3d-contrib /tmp/profile-3d-contrib
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git fetch origin output || echo "Branch output not found"
          
          if git branch -r | grep -q "origin/output"; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf .
          fi
          
          # Move files back
          rm -rf profile-3d-contrib
          mv /tmp/profile-3d-contrib profile-3d-contrib
          
          git add profile-3d-contrib/
          git commit -m "Update 3D contribution graph" || echo "No changes to commit"
          git push origin output -f
