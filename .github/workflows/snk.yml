name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push to output branch
        run: |
          # Move generated files to a safe place
          mv dist /tmp/dist
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git fetch origin output || echo "Branch output not found"
          
          if git branch -r | grep -q "origin/output"; then
            git checkout output
          else
            git checkout --orphan output
            git rm -rf .
          fi
          
          # Move files back
          rm -rf dist
          mv /tmp/dist dist
          
          git add dist/
          git commit -m "Update snake animation" || echo "No changes to commit"
          
          # Retry push with rebase to handle parallel workflow collisions
          MAX_RETRIES=5
          RETRY_COUNT=0
          until git push origin output; do
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Push failed, rebasing and retrying... ($RETRY_COUNT/$MAX_RETRIES)"
            git pull --rebase origin output
            sleep $(( (RANDOM % 10) + 5 ))
          done
